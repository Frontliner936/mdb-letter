<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MICHONGODAILYBROADCAST AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #1a237e;
    }

    input {
      width: 80%;
      max-width: 400px;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 25px;
      background: #1a237e;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0d1440;
    }

    #result {
      margin-top: 20px;
      background: white;
      padding: 15px;
      width: 90%;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 5px;
      white-space: pre-wrap;
      text-align: left;
    }
  </style>
</head>

<body>

  <h1>MICHONGODAILYBROADCAST AI</h1>
  <p>AI Cover Letter Generator</p>

  <input id="name" type="text" placeholder="Full Name"><br>

  <input id="job" type="text" placeholder="Job Title"><br>

  <button onclick="generate()">Generate Cover Letter</button>

  <div id="result"></div>

  <script src="script.js"></script>

</body>
</html>
