<!DOCTYPE html>
<html>
<head>
  <title>MICHONGODAILYBROADCAST CV Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      padding:20px;
    }

    .container{
      max-width:800px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin-top:10px;
      margin-bottom:10px;
    }

    button{
      padding:12px 20px;
      border:none;
      background:#0d47a1;
      color:white;
      cursor:pointer;
    }

    #cvResult{
      margin-top:30px;
      padding:20px;
      border:1px solid #ddd;
      background:#fff;
    }
  </style>
</head>

<body>

<div class="container">

<h1>MICHONGODAILYBROADCAST CV Builder</h1>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<input id="email" placeholder="Email Address">

<textarea id="education" placeholder="Education"></textarea>

<textarea id="experience" placeholder="Work Experience"></textarea>

<textarea id="skills" placeholder="Skills"></textarea>

<button onclick="generateCV()">
Generate CV
</button>

<div id="cvResult"></div>

</div>

<script src="script.js"></script>

</body>
</html>
